# DeepSeek V4 extension configuration example
# Merge this snippet into config.yml; extension config is read from the main config's extensions slot.

extensions:
  deepseek_v4:
    config:
      # Inject a reminder message before the last user input to reinforce system prompt adherence.
      reinforce_instructions: true

      # Custom reminder text; empty string disables this feature.
      reinforce_prompt: "[System Reminder]: Please pay close attention to the system instructions, AGENTS.md files, and any other context provided. Follow them carefully and completely in your response.\n[User]:"

provider:
  providers:
    deepseek:
      models:
        deepseek-v4-pro:
          extensions:
            deepseek_v4:
              enabled: true
